buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

subprojects {
    if (name == "react-native-device-info") {
        tasks.configureEach { task ->
            if (task.name == "extractDebugAnnotations") {
                task.enabled = false
            }
            if (task.name == "syncDebugLibJars") {
                task.doFirst {
                    def typedefFile = file("$buildDir/intermediates/annotations_typedef_file/debug/extractDebugAnnotations/typedefs.txt")
                    typedefFile.parentFile.mkdirs()
                    if (!typedefFile.exists()) {
                        typedefFile.text = ""
                    }
                }
            }
        }
    }
}
